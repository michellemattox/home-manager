name: Garden Weather Sync
on:
  schedule:
    # Run twice daily: 7am and 7pm PT (UTC-7 = 14:00 and 02:00 UTC)
    - cron: "0 14 * * *"
    - cron: "0 2 * * *"
  workflow_dispatch: {}
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Call edge function (cron mode)
        run: |
          curl -X POST \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            https://sjtlmvcxcffftsdleftf.supabase.co/functions/v1/garden-weather \
            -d '{"cron":true}'
